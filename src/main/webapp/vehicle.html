<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app-view" class="view active">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header" style="border: none; padding: 0; cursor: pointer; transition: opacity 0.2s;"
                onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1"
                onclick="const u = JSON.parse(sessionStorage.getItem('currentUser') || '{}'); window.location.href = u.role === 'customer' ? 'viewUpdatecustacc.html' : 'viewUpdatestaffacc.html';">
                <div class="mini-profile" style="width: 100%;">
                    <div class="mini-avatar"><i class="fa-solid fa-user"></i></div>
                    <div
                        style="display: flex; flex-direction: column; justify-content: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                        <h4 id="sidebar-user-name" style="font-size: 14px; margin: 0; color: white;">User</h4>
                        <p id="sidebar-user-role"
                            style="font-size: 11px; opacity: 0.8; margin: 0; text-transform: capitalize; color: white;">
                            Role</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav" style="padding-top: 10px;">
                <a href="dboard.html#dashboard" class="nav-item role-staff" data-target="dashboard">
                    <i class="fa-solid fa-gauge"></i> Dashboard
                </a>

                <div class="nav-section-title"
                    style="padding: 10px 15px 0; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 1px;">
                    Booking</div>
                <a href="custBooking.html" class="nav-item role-customer">
                    <i class="fa-solid fa-calendar-check"></i> My Bookings
                </a>
                <a href="staffBooking.html" class="nav-item role-staff">
                    <i class="fa-solid fa-calendar-check"></i> Manage Bookings
                </a>
                <a href="dboard.html#package" class="nav-item" data-target="package">
                    <i class="fa-solid fa-box"></i> Package
                </a>
                <a href="vehicle.html" class="nav-item active" data-target="vehicle">
                    <i class="fa-solid fa-car"></i> Vehicle
                </a>
                <a href="staffReport.html" class="nav-item role-staff" data-target="report">
                    <i class="fa-solid fa-chart-bar"></i> Report
                </a>
                <a href="staffInvoice.html" class="nav-item" data-target="invoice">
                    <i class="fa-solid fa-file-lines"></i> Invoice
                </a>

                <a href="deleteCust.html" class="nav-item role-staff">
                    <i class="fa-solid fa-users-slash"></i> Manage Customer
                </a>
            </nav>

            <div class="sidebar-footer" style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
                <button id="logout-btn" class="nav-item text-danger"
                    onclick="sessionStorage.removeItem('currentUser'); window.location.href='homepage.html';">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="page-vehicle" class="page active" style="display:block; padding: 2rem; overflow-y: auto;">
                <!-- Top header bar -->
                <div class="vm-wrapper">
                    <div class="vm-header glass-panel">
                        <a href="dboard.html#dashboard">
                            <i class="fa-solid fa-arrow-left"></i> Back to Home</a>
                        <div class="vm-search-wrap">
                            <i class="fa-solid fa-magnifying-glass vm-search-icon"></i>
                            <input type="text" id="vm-top-search" class="vm-top-input"
                                placeholder="Search by vehicle model or vehicle ID..." />
                        </div>
                        <button class="btn btn-primary vm-new-btn" id="vm-new-btn">
                            <i class="fa-solid fa-plus"></i> New Vehicle
                        </button>
                    </div>

                    <!-- Vehicle Management card -->
                    <div class="vm-card glass-panel">
                        <h2 class="vm-title">Vehicle Management</h2>

                        <div class="vm-subbar">
                            <span class="vm-section-label">Previous Vehicle</span>
                            <div class="vm-inline-search">
                                <label>Search:</label>
                                <input type="text" id="vm-inline-search" class="vm-inline-input" />
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="vm-table" id="vm-table">
                                <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>Plate Number</th>
                                        <th>Model</th>
                                        <th>Year Model</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="vm-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- popup msg -->
    <div id="sp-popup-overlay">
        <div id="sp-popup-box">
            <div id="sp-popup-icon"></div>
            <p id="sp-popup-msg"></p>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
